<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mini CRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="bg-dark border-right" id="sidebar-wrapper">
        <div class="sidebar-heading text-white px-3 py-4 fs-4 fw-bold">
            <i class="bi bi-people-fill me-2"></i> Mini CRM
            <div class="fs-6 fw-normal">AI Business</div>
        </div>
        <div class="list-group list-group-flush">
            <a href="{{ url_for('workspace') }}" class="list-group-item list-group-item-action bg-dark text-white">Рабочий лист</a>
            <a href="{{ url_for('clients') }}" class="list-group-item list-group-item-action bg-dark text-white">Клиенты</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Сделки</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Задачи</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Поставщики</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Контакты</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Сообщения</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Документы</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Отчёты</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">AI Ассистент</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Настройки</a>
        </div>
    </div>
    <!-- /#sidebar-wrapper -->
    <!-- Page Content -->
    <div id="page-content-wrapper" class="flex-grow-1">
        <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
            <div class="container-fluid">
                <button class="btn btn-primary" id="menu-toggle">☰</button>
                <form class="d-flex ms-3 flex-grow-1" role="search">
                    <input class="form-control me-2" type="search" placeholder="Поиск клиентов, сделок, задач..." aria-label="Search">
                </form>
                <ul class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="#">
                            <i class="bi bi-bell"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">3</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="#">
                            <i class="bi bi-envelope"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">5</span>
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Admin
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">Профиль</a></li>
                            <li><a class="dropdown-item" href="#">Выйти</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </nav>
        <div class="container-fluid p-4">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const menuToggle = document.getElementById('menu-toggle');
    const wrapper = document.getElementById('wrapper');
    menuToggle.addEventListener('click', () => {
        wrapper.classList.toggle('toggled');
    });
</script>
<script src="{{ url_for('static', filename='js/kanban.js') }}"></script>
</body>
</html>
