{% extends "base.html" %}

{% block title %}Клиенты - Mini CRM{% endblock %}

{% block content %}
<h1>Клиенты</h1>

<div class="table-responsive">
<table class="table table-striped">
    <thead>
        <tr>
            <th>Имя</th>
            <th>Email</th>
            <th>Телефон</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for client in clients %}
        <tr>
            <td>{{ client.name }}</td>
            <td>{{ client.email }}</td>
            <td>{{ client.phone }}</td>
            <td>
                <a href="{{ url_for('edit_client', client_id=client.id) }}" class="btn btn-sm btn-warning">Редактировать</a>
                <form action="{{ url_for('delete_client', client_id=client.id) }}" method="post" style="display:inline-block;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить клиента?');">Удалить</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

<a href="{{ url_for('logout') }}" class="btn btn-secondary">Выйти</a>

{% endblock %}
