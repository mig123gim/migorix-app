{% extends "base.html" %}

{% block title %}Добавить сделку - Mini CRM{% endblock %}

{% block content %}
<h1>Добавить сделку</h1>
<form method="post">
    <div class="mb-3">
        <label for="title" class="form-label">Название</label>
        <input type="text" class="form-control" id="title" name="title" required>
    </div>
    <div class="mb-3">
        <label for="company" class="form-label">Компания</label>
        <input type="text" class="form-control" id="company" name="company" required>
    </div>
    <div class="mb-3">
        <label for="amount" class="form-label">Сумма</label>
        <input type="number" class="form-control" id="amount" name="amount" required>
    </div>
    <div class="mb-3">
        <label for="date_created" class="form-label">Дата</label>
        <input type="date" class="form-control" id="date_created" name="date_created" required>
    </div>
    <div class="mb-3">
        <label for="status" class="form-label">Статус</label>
        <select class="form-select" id="status" name="status" required>
            <option value="new">Новый</option>
            <option value="in_progress">В работе</option>
            <option value="negotiation">Переговоры</option>
            <option value="done">Завершено</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Добавить</button>
    <a href="{{ url_for('workspace') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
